services:
  postgres:
    image: postgres:16-alpine
    container_name: mirev-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mirev}
      POSTGRES_USER: ${POSTGRES_USER:-mirev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mirev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-mirev} -d ${POSTGRES_DB:-mirev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
